# =============================================================
# SOC Dashboard — nginx reverse proxy
# =============================================================
# Place at: /etc/nginx/sites-available/soc-dashboard
# Symlink:  ln -s /etc/nginx/sites-available/soc-dashboard /etc/nginx/sites-enabled/
#
# IMPORTANT: Replace YOUR_DOMAIN below with your actual domain name:
#   sed -i 's/YOUR_DOMAIN/your-actual-domain.com/g' /etc/nginx/sites-available/soc-dashboard
#
# After editing, run:  nginx -t && systemctl reload nginx
# Then obtain a TLS cert:
#   certbot certonly --webroot -w /var/www/html -d your-actual-domain.com
#
# WARNING — DO NOT run `certbot --nginx` on this file.
#   certbot --nginx rewrites listen directives and removes proxy_protocol,
#   breaking TLS when behind an upstream SNI proxy. Use --webroot or --standalone
#   to obtain the cert, then let this config reference it as-is.
#
# If NOT behind an upstream proxy_protocol proxy:
#   Remove `proxy_protocol` from the listen 443 lines AND delete the
#   set_real_ip_from / real_ip_header lines. Direct clients don't send
#   proxy protocol preambles — nginx will reject them with ERR_SSL_PROTOCOL_ERROR.
# =============================================================

# ── HTTP — ACME challenge + redirect ────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — proxy_protocol from upstream SNI proxy ──
# If you are NOT behind a proxy_protocol proxy, remove `proxy_protocol`
# from both listen lines and delete the set_real_ip_from block.
server {
    listen 443 ssl http2 proxy_protocol;
    listen [::]:443 ssl http2 proxy_protocol;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Extract real client IP from proxy protocol header
    # Replace PROXY_IP with your upstream proxy's IP address
    set_real_ip_from PROXY_IP;
    real_ip_header proxy_protocol;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ~* \.(js|css|png|ico|svg|woff2?)$ {
        proxy_pass http://127.0.0.1:5000;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
