# =============================================================
# SOC Dashboard — nginx reverse proxy
# =============================================================
# Place at: /etc/nginx/sites-available/soc-dashboard
# Symlink:  ln -s /etc/nginx/sites-available/soc-dashboard /etc/nginx/sites-enabled/
#
# IMPORTANT: Replace YOUR_DOMAIN below with your actual domain name:
#   sed -i 's/YOUR_DOMAIN/your-actual-domain.com/g' /etc/nginx/sites-available/soc-dashboard
#
# After editing, run:  nginx -t && systemctl reload nginx
# Then run certbot:    certbot --nginx -d your-actual-domain.com
#   certbot will automatically add the HTTPS server block with TLS certs.
#
# For proxy_protocol from an upstream proxy, see the HTTPS block below.
# =============================================================

# ── HTTP — serves ACME challenges and redirects to HTTPS ────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Before certbot: proxy to gunicorn directly (HTTP)
    # After certbot:  this becomes a 301 redirect to HTTPS
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

